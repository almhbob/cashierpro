openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Supermarket POS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product management
  - name: sales
    description: Sales and transactions
  - name: inventory
    description: Inventory management and analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/barcode/{barcode}:
    get:
      operationId: getProductByBarcode
      tags: [products]
      summary: Get product by barcode
      parameters:
        - name: barcode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Product deleted
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales:
    get:
      operationId: listSales
      tags: [sales]
      summary: List recent sales
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: List of sales
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Sale"
    post:
      operationId: createSale
      tags: [sales]
      summary: Create a new sale (checkout)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSaleBody"
      responses:
        "201":
          description: Sale created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sale"

  /sales/{id}:
    get:
      operationId: getSale
      tags: [sales]
      summary: Get sale details with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sale details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaleWithItems"
        "404":
          description: Sale not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /sales/stats/daily:
    get:
      operationId: getDailyStats
      tags: [sales]
      summary: Get daily sales statistics
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyStats"

  /sales/trends:
    get:
      operationId: getSalesTrends
      tags: [sales]
      summary: Get sales trends for the last 30 days
      responses:
        "200":
          description: Daily trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesTrendDay"

  /inventory/report:
    get:
      operationId: getInventoryReport
      tags: [inventory]
      summary: Full inventory report with stock values
      responses:
        "200":
          description: Inventory report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryReport"

  /inventory/insights:
    get:
      operationId: getInventoryInsights
      tags: [inventory]
      summary: Product performance insights (fast/slow/dead movers)
      responses:
        "200":
          description: Product insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductInsight"

  /inventory/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [inventory]
      summary: Products that are low in stock or out of stock
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductInsight"

  /products/{id}/receive-stock:
    post:
      operationId: receiveProductStock
      tags: [inventory]
      summary: Add received quantity to existing product stock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveStockBody"
      responses:
        "200":
          description: Stock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory/receive-batch:
    post:
      operationId: receiveBatchStock
      tags: [inventory]
      summary: Receive multiple products in one batch (from barcode scanner session)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveBatchBody"
      responses:
        "200":
          description: Batch received successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReceiveBatchResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}/adjust-stock:
    post:
      operationId: adjustProductStock
      tags: [inventory]
      summary: Adjust product stock (inventory count correction)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustStockBody"
      responses:
        "200":
          description: Stock adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    Product:
      type: object
      properties:
        id:
          type: integer
        barcode:
          type: string
        name:
          type: string
        nameAr:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        unit:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - barcode
        - name
        - nameAr
        - price
        - stock
        - category
        - unit
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        barcode:
          type: string
        name:
          type: string
        nameAr:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        unit:
          type: string
      required:
        - barcode
        - name
        - nameAr
        - price
        - stock
        - category
        - unit

    UpdateProductBody:
      type: object
      properties:
        barcode:
          type: string
        name:
          type: string
        nameAr:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        unit:
          type: string

    SaleItem:
      type: object
      properties:
        id:
          type: integer
        saleId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        productNameAr:
          type: string
        barcode:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        subtotal:
          type: number
      required:
        - id
        - saleId
        - productId
        - productName
        - productNameAr
        - barcode
        - quantity
        - unitPrice
        - subtotal

    Sale:
      type: object
      properties:
        id:
          type: integer
        total:
          type: number
        amountPaid:
          type: number
        change:
          type: number
        cashierName:
          type: string
        createdAt:
          type: string
      required:
        - id
        - total
        - amountPaid
        - change
        - cashierName
        - createdAt

    SaleWithItems:
      type: object
      properties:
        id:
          type: integer
        total:
          type: number
        amountPaid:
          type: number
        change:
          type: number
        cashierName:
          type: string
        createdAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SaleItem"
      required:
        - id
        - total
        - amountPaid
        - change
        - cashierName
        - createdAt
        - items

    CreateSaleItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - quantity

    CreateSaleBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateSaleItemInput"
        amountPaid:
          type: number
        cashierName:
          type: string
      required:
        - items
        - amountPaid
        - cashierName

    DailyStats:
      type: object
      properties:
        totalSales:
          type: integer
        totalRevenue:
          type: number
        totalItems:
          type: integer
        averageOrderValue:
          type: number
      required:
        - totalSales
        - totalRevenue
        - totalItems
        - averageOrderValue

    SalesTrendDay:
      type: object
      properties:
        date:
          type: string
        totalSales:
          type: integer
        totalRevenue:
          type: number
      required:
        - date
        - totalSales
        - totalRevenue

    ProductInsight:
      type: object
      properties:
        id:
          type: integer
        barcode:
          type: string
        name:
          type: string
        nameAr:
          type: string
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
        unit:
          type: string
        totalSoldLast30Days:
          type: integer
        totalRevenueLast30Days:
          type: number
        salesVelocityPerDay:
          type: number
        daysOfStockLeft:
          type: ["number", "null"]
        status:
          type: string
          enum: [fast, normal, slow, dead, new]
        stockValue:
          type: number
        lastSoldAt:
          type: ["string", "null"]
        recommendation:
          type: string
      required:
        - id
        - barcode
        - name
        - nameAr
        - price
        - stock
        - category
        - unit
        - totalSoldLast30Days
        - totalRevenueLast30Days
        - salesVelocityPerDay
        - daysOfStockLeft
        - status
        - stockValue
        - lastSoldAt
        - recommendation

    InventoryReport:
      type: object
      properties:
        generatedAt:
          type: string
        totalProducts:
          type: integer
        totalStockValue:
          type: number
        outOfStock:
          type: integer
        lowStock:
          type: integer
        fastMovers:
          type: integer
        slowMovers:
          type: integer
        deadStock:
          type: integer
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductInsight"
      required:
        - generatedAt
        - totalProducts
        - totalStockValue
        - outOfStock
        - lowStock
        - fastMovers
        - slowMovers
        - deadStock
        - products

    AdjustStockBody:
      type: object
      properties:
        newStock:
          type: integer
        reason:
          type: string
      required:
        - newStock
        - reason

    ReceiveStockBody:
      type: object
      properties:
        quantity:
          type: integer
        notes:
          type: string
      required:
        - quantity

    ReceiveBatchItemInput:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required:
        - productId
        - quantity

    ReceiveBatchBody:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiveBatchItemInput"
        notes:
          type: string
        supplierName:
          type: string
      required:
        - items

    ReceiveBatchResultItem:
      type: object
      properties:
        productId:
          type: integer
        productNameAr:
          type: string
        barcode:
          type: string
        previousStock:
          type: integer
        addedQuantity:
          type: integer
        newStock:
          type: integer
      required:
        - productId
        - productNameAr
        - barcode
        - previousStock
        - addedQuantity
        - newStock

    ReceiveBatchResult:
      type: object
      properties:
        receivedAt:
          type: string
        supplierName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        totalItemsReceived:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/ReceiveBatchResultItem"
      required:
        - receivedAt
        - supplierName
        - notes
        - totalItemsReceived
        - items
