name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js 20 ────────────────────────────────────────────────────
      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Cache Electron ─────────────────────────────────────────────────
      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-electron-29-${{ hashFiles('desktop-app/package.json') }}

      # ── 4. Set version ───────────────────────────────────────────────────
      - name: Set version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${{ github.ref_name }}"; V="${V#v}"
          else
            V="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          echo "APP_VERSION=$V" >> $GITHUB_ENV
          node -e "
            const fs=require('fs');
            const p=JSON.parse(fs.readFileSync('desktop-app/package.json','utf8'));
            p.version='$V';
            fs.writeFileSync('desktop-app/package.json',JSON.stringify(p,null,2));
            console.log('Version set to $V');
          "

      # ── 5. Inject APP_URL ─────────────────────────────────────────────────
      - name: Inject URL
        shell: bash
        run: |
          URL="${{ secrets.APP_URL || 'https://cashierpro.replit.app' }}"
          sed -i "s|https://cashierpro.replit.app|$URL|g" desktop-app/src/license-validator.js
          sed -i "s|https://cashierpro.replit.app|$URL|g" desktop-app/src/main.js

      # ── 6. Install npm dependencies ───────────────────────────────────────
      - name: npm install
        working-directory: desktop-app
        shell: cmd
        run: npm install

      # ── 7. Rebuild native modules for Electron ────────────────────────────
      # Uses @electron/rebuild (official tool) to compile better-sqlite3
      # specifically against the Electron runtime ABI.
      - name: Rebuild native modules
        working-directory: desktop-app
        shell: cmd
        run: npx @electron/rebuild -f -w better-sqlite3

      # ── 8. Build Windows Installer EXE ───────────────────────────────────
      - name: Build EXE
        working-directory: desktop-app
        shell: cmd
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Verify output ──────────────────────────────────────────────────
      - name: Verify EXE
        shell: bash
        run: |
          echo "=== dist-exe contents ==="
          find desktop-app/dist-exe -type f 2>/dev/null || echo "empty"
          N=$(find desktop-app/dist-exe -name "*.exe" 2>/dev/null | wc -l)
          echo "EXE count: $N"
          [ "$N" -gt 0 ] || exit 1

      # ── 10. GitHub Release ────────────────────────────────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.APP_VERSION }}"
          name: "كاشير برو v${{ env.APP_VERSION }}"
          body: |
            ## كاشير برو — نظام نقطة البيع المتكامل
            **الإصدار:** ${{ env.APP_VERSION }}

            ### ✨ المميزات
            - 🛒 شاشة كاشير (بحث + باركود + احتساب الباقي + طباعة)
            - 📦 إدارة المنتجات (إضافة / تعديل / حذف)
            - 📋 سجل المبيعات مع إعادة طباعة الفواتير
            - ↩️ نظام الإرجاع الكامل (جزئي / كلي + إعادة المخزون تلقائياً)
            - 📊 تقارير يومية وشهرية وأكثر المنتجات مبيعاً
            - ⚙️ إعدادات شاملة (الضريبة، العملة، الإيصال)
            - 💾 **يعمل بالكامل بدون إنترنت** بعد التفعيل الأول

            ### 📥 التثبيت
            1. حمّل `CashierPro-Setup-${{ env.APP_VERSION }}.exe`
            2. شغّل الملف وقبل طلب الصلاحيات
            3. أدخل رمز الترخيص
            4. ابدأ الاستخدام!

            ### 💻 المتطلبات
            - Windows 10 / 11 (64-bit)
            - إنترنت مرة واحدة عند التفعيل فقط

            ### 📞 الترخيص والدعم
            - Almhbob.iii@gmail.com
            - 0530658285
          draft: false
          prerelease: false
          files: |
            desktop-app/dist-exe/*.exe
            desktop-app/dist-exe/*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
