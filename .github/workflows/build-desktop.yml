name: Build Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: desktop-app

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Verify offline renderer ────────────────────────────────────────
      - name: Verify offline renderer
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Offline POS renderer ==="
          ls -la desktop-app/renderer/dist/
          echo "Lines: $(wc -l < desktop-app/renderer/dist/index.html)"

      # ── 4. Set version ───────────────────────────────────────────────────
      - name: Set version
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('desktop-app/package.json', 'utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('desktop-app/package.json', JSON.stringify(p, null, 2));
            console.log('Version set:', '$VERSION');
          "

      # ── 5. Inject APP_URL ─────────────────────────────────────────────────
      - name: Inject app URL
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          APP_URL="${{ secrets.APP_URL || 'https://cashierpro.replit.app' }}"
          sed -i "s|https://cashierpro.replit.app|$APP_URL|g" desktop-app/src/license-validator.js
          sed -i "s|https://cashierpro.replit.app|$APP_URL|g" desktop-app/src/main.js
          echo "Injected URL: $APP_URL"

      # ── 6. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        shell: cmd
        run: npm install --ignore-scripts

      # ── 7. Rebuild native modules for Electron ────────────────────────────
      - name: Rebuild native modules
        shell: cmd
        run: npx electron-builder install-app-deps

      # ── 8. Build Windows EXE ─────────────────────────────────────────────
      - name: Build Windows EXE
        shell: cmd
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Confirm EXE ────────────────────────────────────────────────────
      - name: Confirm EXE created
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          echo "=== Built files ==="
          find desktop-app/dist-exe -name "*.exe" 2>/dev/null || true
          COUNT=$(find desktop-app/dist-exe -name "*.exe" 2>/dev/null | wc -l)
          echo "EXE count: $COUNT"
          [ "$COUNT" -gt 0 ] || exit 1

      # ── 10. Create GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.APP_VERSION }}"
          name: "كاشير برو v${{ env.APP_VERSION }}"
          body: |
            ## كاشير برو — نظام نقطة البيع المتكامل
            **الإصدار:** ${{ env.APP_VERSION }}

            ### ✨ المميزات
            - 🛒 شاشة كاشير (بحث + باركود + احتساب الباقي + طباعة)
            - 📦 إدارة المنتجات (إضافة / تعديل / حذف)
            - 📋 سجل المبيعات مع إعادة طباعة الفواتير
            - ↩️ نظام الإرجاع الكامل (جزئي / كلي + إعادة المخزون)
            - 📊 تقارير يومية وشهرية وأكثر المنتجات مبيعاً
            - ⚙️ إعدادات شاملة (الضريبة، العملة، رأس الإيصال)
            - 💾 **يعمل بالكامل بدون إنترنت** بعد التفعيل الأول

            ### 📥 خطوات التثبيت
            1. حمّل `CashierPro-Setup-${{ env.APP_VERSION }}.exe`
            2. شغّل الملف (قد يطلب صلاحيات المدير — اقبل)
            3. أدخل رمز الترخيص عند الطلب
            4. ابدأ الاستخدام فوراً!

            ### 💻 المتطلبات
            - Windows 10 / 11 (64-bit)
            - إنترنت مرة واحدة فقط عند التفعيل

            ### 📞 للاستفسار والترخيص
            - البريد: Almhbob.iii@gmail.com
            - الهاتف: 0530658285
          draft: false
          prerelease: false
          files: |
            desktop-app/dist-exe/*.exe
            desktop-app/dist-exe/*.yml
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
