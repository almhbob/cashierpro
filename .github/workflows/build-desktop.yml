name: Build Windows EXE

on:
  # Manual trigger with optional version tag
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.0.0)"
        required: false
        default: "1.0.0"
  # Auto-build on version tags like v1.2.3
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. Setup pnpm ────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ── 4. Install workspace deps (shared packages) ──────────────────
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
        env:
          npm_config_build_from_source: "true"

      # ── 5. Confirm offline renderer exists ────────────────────────────
      #       The offline POS HTML is pre-built and committed in the repo.
      #       No internet or Clerk required — full offline operation.
      - name: Verify offline renderer
        shell: bash
        run: |
          echo "✅ Offline POS renderer:"
          ls desktop-app/renderer/dist/
          wc -l desktop-app/renderer/dist/index.html

      # ── 7. Set version from tag or input ─────────────────────────────
      - name: Set version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          # Update package.json version
          node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('desktop-app/package.json','utf8')); p.version='$VERSION'; fs.writeFileSync('desktop-app/package.json',JSON.stringify(p,null,2));"

      # ── 8. Inject build-time env into Electron ───────────────────────
      - name: Inject app URLs into Electron source
        shell: bash
        run: |
          APP_URL="${{ secrets.APP_URL || 'https://cashierpro.replit.app' }}"
          # Replace placeholder in license-validator.js
          sed -i "s|https://cashierpro.replit.app|$APP_URL|g" desktop-app/src/license-validator.js
          sed -i "s|https://cashierpro.replit.app|$APP_URL|g" desktop-app/src/main.js

      # ── 9. Install desktop-app deps (native, Windows) ────────────────
      - name: Install Electron app dependencies
        working-directory: desktop-app
        run: npm install

      # ── 10. Build Windows EXE ─────────────────────────────────────────
      - name: Build Windows EXE
        working-directory: desktop-app
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. List built artifacts ──────────────────────────────────────
      - name: List output files
        shell: bash
        run: |
          echo "=== Built EXE files ==="
          find desktop-app/dist-exe -name "*.exe" 2>/dev/null || echo "No EXE found"

      # ── 12. Create GitHub Release & upload EXE ────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.APP_VERSION }}"
          name: "CashierPro v${{ env.APP_VERSION }} — كاشير برو"
          body: |
            ## كاشير برو — نظام إدارة نقاط البيع
            **الإصدار:** ${{ env.APP_VERSION }}

            ### التثبيت
            1. قم بتحميل الملف `CashierPro-Setup-${{ env.APP_VERSION }}.exe`
            2. شغّل ملف التثبيت بصلاحيات المدير
            3. أدخل رمز الترخيص عند الطلب
            4. ابدأ الاستخدام مباشرة!

            ### المتطلبات
            - Windows 10/11 (64-bit)
            - إنترنت فقط عند التفعيل الأول (مرة واحدة)
            - **يعمل بعدها بدون إنترنت تماماً** 🚀

            ### التواصل
            للحصول على ترخيص: [Almhbob.iii@gmail.com](mailto:Almhbob.iii@gmail.com)
          draft: false
          prerelease: false
          files: |
            desktop-app/dist-exe/*.exe
            desktop-app/dist-exe/*.yml
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
