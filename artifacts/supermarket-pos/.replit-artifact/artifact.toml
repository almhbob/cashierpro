kind = "web"
previewPath = "/"
title = "نظام إدارة السوبر ماركت"
version = "1.0.0"
id = "artifacts/supermarket-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18630

[services.development]
run = "pnpm --filter @workspace/supermarket-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/supermarket-pos", "run", "build" ]
publicDir = "artifacts/supermarket-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18630"
BASE_PATH = "/"
